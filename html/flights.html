<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BlueSky | Search Flights</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/flights.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-container">
        <div class="logo"><i class="fas fa-plane-departure"></i> BlueSky</div>
        <div class="nav-links">
            <a href="#" id="homeNav">Home</a>
            <a href="#" id="passengerDetailsNav">Passenger Details</a>
        </div>
        <div class="auth-buttons">
            <button class="btn-login" id="loginBtn">Login</button>
            <button class="btn-signup" id="signupBtn">Sign Up</button>
        </div>
    </div>
</div>

<!-- Progress Steps (Step 1 Active - Flight) -->
<div class="progress-steps">
    <div class="steps">
        <span class="step active">
            <div class="step-circle">1</div>
            <span>Flight</span>
        </span>
        <div class="step-line"></div>
        <a href="passenger_details.html" class="step">
            <div class="step-circle">2</div>
            <span>Passenger</span>
        </a>
        <div class="step-line"></div>
        <a href="addons.html" class="step">
            <div class="step-circle">3</div>
            <span>Add-ons</span>
        </a>
        <div class="step-line"></div>
        <a href="seat_selection.html" class="step">
            <div class="step-circle">4</div>
            <span>Seat</span>
        </a>
        <div class="step-line"></div>
        <a href="summary.html" class="step">
            <div class="step-circle">5</div>
            <span>Summary</span>
        </a>
        <div class="step-line"></div>
        <a href="payment.html" class="step">
            <div class="step-circle">6</div>
            <span>Payment</span>
        </a>
    </div>
</div>

<!-- Hero Section with Search -->
<div class="hero" id="home">
    <div class="container">
        <div class="search-card">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> From</label>
                    <input type="text" id="origin" placeholder="City or airport" list="cities" value="Chennai (MAA)">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-location-dot"></i> To</label>
                    <input type="text" id="destination" placeholder="Destination" list="cities" value="Delhi (DEL)">
                </div>
                <div class="form-group">
                    <label><i class="far fa-calendar-alt"></i> Date</label>
                    <input type="date" id="travelDate" value="2026-05-15">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-friends"></i> Passengers</label>
                    <input type="number" id="passengers" min="1" value="1">
                </div>
                <button class="search-btn" id="searchFlightsBtn"><i class="fas fa-search"></i> Search Flights</button>
            </div>
            <datalist id="cities">
                <!-- Major Indian Cities -->
                <option value="Chennai (MAA)">
                <option value="Delhi (DEL)">
                <option value="Mumbai (BOM)">
                <option value="Bengaluru (BLR)">
                <option value="Kolkata (CCU)">
                <option value="Hyderabad (HYD)">
                <option value="Ahmedabad (AMD)">
                <option value="Pune (PNQ)">
                <option value="Goa (GOI)">
                <option value="Jaipur (JAI)">
                <option value="Kochi (COK)">
                <option value="Lucknow (LKO)">
                <option value="Chandigarh (IXC)">
                <option value="Bagdogra (IXB)">
                <option value="Guwahati (GAU)">
                <option value="Port Blair (IXZ)">
                <option value="Vizag (VTZ)">
                <option value="Coimbatore (CJB)">
                <option value="Trivandrum (TRV)">
                <option value="Nagpur (NAG)">
                <option value="Bhopal (BHO)">
                <option value="Indore (IDR)">
                <option value="Surat (STV)">
                <option value="Vadodara (BDQ)">
                <option value="Raipur (RPR)">
                <option value="Ranchi (IXR)">
                <option value="Patna (PAT)">
                <option value="Srinagar (SXR)">
                <option value="Leh (IXL)">
                <option value="Amritsar (ATQ)">
                <option value="Udaipur (UDR)">
                <option value="Jodhpur (JDH)">
                <!-- International Cities -->
                <option value="Dubai (DXB)">
                <option value="Singapore (SIN)">
                <option value="Bangkok (BKK)">
                <option value="Kuala Lumpur (KUL)">
                <option value="London (LHR)">
                <option value="New York (JFK)">
                <option value="Paris (CDG)">
                <option value="Tokyo (NRT)">
                <option value="Sydney (SYD)">
                <option value="Toronto (YYZ)">
                <option value="Chicago (ORD)">
                <option value="Los Angeles (LAX)">
                <option value="San Francisco (SFO)">
                <option value="Seattle (SEA)">
                <option value="Boston (BOS)">
                <option value="Washington DC (IAD)">
                <option value="Dallas (DFW)">
                <option value="Miami (MIA)">
                <option value="Amsterdam (AMS)">
                <option value="Frankfurt (FRA)">
                <option value="Zurich (ZRH)">
                <option value="Rome (FCO)">
                <option value="Madrid (MAD)">
                <option value="Barcelona (BCN)">
                <option value="Vienna (VIE)">
                <option value="Prague (PRG)">
                <option value="Istanbul (IST)">
                <option value="Doha (DOH)">
                <option value="Abu Dhabi (AUH)">
                <option value="Muscat (MCT)">
                <option value="Colombo (CMB)">
                <option value="Dhaka (DAC)">
                <option value="Kathmandu (KTM)">
                <option value="Malé (MLE)">
                <option value="Hong Kong (HKG)">
                <option value="Shanghai (PVG)">
                <option value="Beijing (PEK)">
                <option value="Seoul (ICN)">
                <option value="Osaka (KIX)">
                <option value="Taipei (TPE)">
                <option value="Manila (MNL)">
                <option value="Jakarta (CGK)">
                <option value="Ho Chi Minh (SGN)">
                <option value="Hanoi (HAN)">
                <option value="Yangon (RGN)">
                <option value="Phuket (HKT)">
                <option value="Bali (DPS)">
            </datalist>
        </div>
    </div>
</div>

<!-- Flights Results Section -->
<div class="container" style="margin-top: 2rem;">
    <div class="results-header">
        <h2 class="section-title">✈️ Available Flights</h2>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All Flights</button>
            <button class="filter-btn" data-filter="domestic">Domestic</button>
            <button class="filter-btn" data-filter="international">International</button>
        </div>
    </div>
    <div class="flight-grid" id="flightGrid"></div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-section"><h4>BlueSky Airlines</h4><p>Your trusted travel partner</p></div>
            <div class="footer-section"><h4>Contact</h4><p><i class="fas fa-envelope"></i> support@bluesky.com</p><p><i class="fas fa-phone-alt"></i> +91 9876543210</p></div>
            <div class="footer-section"><h4>Follow Us</h4><p><i class="fab fa-facebook"></i> Facebook</p><p><i class="fab fa-instagram"></i> Instagram</p></div>
        </div>
        <div class="copyright">&copy; 2026 BlueSky Airlines. All rights reserved.</div>
    </div>
</footer>

<div class="help-button" id="helpButton"><i class="fas fa-headset"></i></div>
<div class="scroll-top" id="scrollTopBtn"><i class="fas fa-arrow-up"></i></div>

<script src="../js/flights.js"></script>
</body>
</html>
