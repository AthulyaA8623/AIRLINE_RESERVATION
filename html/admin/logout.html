<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging out... - Airline Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../css/logout.css">
</head>
<body>
    <div class="logout-container">
        <div class="logout-card">
            <div class="logout-icon">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h2>Logging out...</h2>
            <p>You have been successfully logged out.</p>
            <p class="redirect-message">Redirecting to login page in <span id="countdown">3</span> seconds...</p>
            <button id="redirectBtn" class="redirect-btn">
                <i class="fas fa-arrow-right"></i> Go to Login Now
            </button>
        </div>
    </div>
    <script src="../../js/logout.js"></script>
</body>
</html>
