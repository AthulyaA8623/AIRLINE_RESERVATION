<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Management - Airline Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../css/seat.css">
</head>
<body>
    <div class="navbar">
        <div class="logo"><h2><i class="fas fa-plane"></i> Airline Admin</h2></div>
        <div class="nav-links">
            <a href="Dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="Addflight.html"><i class="fas fa-plus-circle"></i> Add Flight</a>
            <a href="Updateflight.html"><i class="fas fa-pen-alt"></i> Update Flight</a>
            <a href="Deleteflight.html"><i class="fas fa-trash-alt"></i> Delete Flight</a>
            <a href="viewflight.html"><i class="fas fa-list-ul"></i> View Flights</a>
            <a href="viewbook.html"><i class="fas fa-ticket-alt"></i> View Bookings</a>
            <a href="seat.html" class="active"><i class="fas fa-chair"></i> Seat Mgmt</a>
            <a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-chair"></i> Seat Inventory Control</h1>
            <p>Manage seat availability and configurations for all flights</p>
        </div>

        <!-- Flight Selection Dropdown -->
        <div class="flight-selector">
            <div class="selector-wrapper">
                <i class="fas fa-plane-departure"></i>
                <select id="flightSelect">
                    <option value="">-- Select a Flight --</option>
                </select>
            </div>
            <div class="flight-info" id="flightInfo"></div>
        </div>

        <div id="seatList"></div>
    </div>

    <script src="../../js/seat.js"></script>
</body>
</html>
